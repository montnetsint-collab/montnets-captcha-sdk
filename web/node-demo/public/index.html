<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Montnets Captcha Demo Login</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "SF Pro Display", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at top, rgba(45, 103, 255, 0.18), transparent 30%),
        linear-gradient(160deg, #eef4ff 0%, #f7fbff 50%, #eef8f3 100%);
      color: #101828;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 32px 28px 28px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(16, 24, 40, 0.08);
      box-shadow: 0 24px 80px rgba(16, 24, 40, 0.14);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.1;
    }

    .form {
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #344054;
    }

    input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      border: 1px solid #d0d7e2;
      border-radius: 14px;
      outline: none;
      font-size: 14px;
      transition: border-color .18s ease, box-shadow .18s ease;
      background: #fff;
    }

    input:focus {
      border-color: #3b63ff;
      box-shadow: 0 0 0 4px rgba(59, 99, 255, 0.12);
    }

    button {
      width: 100%;
      height: 48px;
      margin-top: 4px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #2f5bff, #4a7cff);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(47, 91, 255, 0.22);
      transition: transform .16s ease, opacity .16s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .toast-stack {
      position: fixed;
      top: 20px;
      right: 20px;
      display: grid;
      gap: 12px;
      z-index: 100000;
    }

    .toast {
      min-width: 240px;
      max-width: min(420px, calc(100vw - 32px));
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(16, 24, 40, 0.08);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 20px 48px rgba(16, 24, 40, 0.14);
      font-size: 13px;
      line-height: 1.5;
      color: #1f2937;
      animation: toastIn .18s ease;
      backdrop-filter: blur(10px);
    }

    .toast.success {
      background: #f0fdf4;
      border-color: #bbf7d0;
      color: #15803d;
    }

    .toast.error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #b91c1c;
    }

    .toast.info {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #1d4ed8;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <main class="login-card">
    <h1>Demo Login</h1>

    <div class="form">
      <label>
        Username
        <input id="username" type="text" value="demo.user" placeholder="Enter username">
      </label>

      <label>
        Password
        <input id="password" type="password" value="Passw0rd!" placeholder="Enter password">
      </label>

      <button id="btn-login" type="button">Sign In</button>
    </div>
  </main>

  <script src="./montnets-captcha-sdk.js"></script>
  <script>
    const state = {
      captchaToken: "",
      pendingLogin: false
    };

    const loginBtnEl = document.getElementById("btn-login");
    const toastStackEl = document.getElementById("toast-stack");

    function showToast(message, type = "info") {
      if (!message) return;

      const toastEl = document.createElement("div");
      toastEl.className = `toast ${type}`;
      toastEl.textContent = message;
      toastStackEl.appendChild(toastEl);

      window.setTimeout(() => {
        toastEl.style.opacity = "0";
        toastEl.style.transform = "translateY(-6px)";
        toastEl.style.transition = "opacity .18s ease, transform .18s ease";

        window.setTimeout(() => {
          if (toastEl.parentNode) {
            toastEl.parentNode.removeChild(toastEl);
          }
        }, 180);
      }, 2600);
    }

    async function requestCaptchaToken() {
      const response = await fetch("/api/captcha-token");
      const payload = await response.json();

      return payload.data.accessToken;
    }

    async function doLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (!username || !password) {
        showToast("Enter both username and password.", "error");
        return;
      }

      if (!state.captchaToken) {
        state.pendingLogin = true;
        window.CaptchaSDK.show();
        return;
      }

      loginBtnEl.disabled = true;

      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username,
            password,
            captchaToken: state.captchaToken
          })
        });
        const payload = await response.json();

        if (!response.ok || !payload.success) {
          throw new Error(payload.message || "Sign-in failed.");
        }

        state.captchaToken = "";
        state.pendingLogin = false;
        showToast(`Sign-in succeeded. Token status: ${payload.data.tokenStatus}; session ID: ${payload.data.session.sessionId}`, "success");
      } catch (error) {
        state.captchaToken = "";
        state.pendingLogin = false;
        showToast(error.message || "Sign-in failed.", "error");
      } finally {
        loginBtnEl.disabled = false;
      }
    }

    function initSdk() {
      if (!window.CaptchaSDK) {
        showToast("Failed to load the SDK. Check montnets-captcha-sdk.js.", "error");
        return;
      }

      window.CaptchaSDK.init({
        serverUrl: "",
        tokenProvider: requestCaptchaToken,
        messages: {
          verificationFailed: "Verification failed. Please try again.",
          submissionFailed: "Captcha session expired. Request a new one.",
          verificationPassed: "Verification passed."
        },
        onSuccess: async (captchaToken) => {
          state.captchaToken = captchaToken;
          // if (state.pendingLogin) {
          //   await doLogin();
          // }
        },
        onError: (error) => {
          state.captchaToken = "";
          state.pendingLogin = false;
          showToast(error && error.message ? error.message : "Captcha request failed.", "error");
        },
        onClose: () => {
   
        }
      });
    }

    loginBtnEl.addEventListener("click", doLogin);
    initSdk();
  </script>
</body>

</html>
